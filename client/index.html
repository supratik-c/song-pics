<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badly Drawn Bangers</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script type="module" src="./src/main.ts"></script>
  </head>
  <body>
    <main class="shell">
      <header class="masthead">
        <p class="kicker">Daily song puzzle</p>
        <h1>Badly Drawn Bangers</h1>
        <p class="intro">Guess today's song from the badly drawn chorus panels.</p>
      </header>

      <div class="game-area">
        <div class="archive-control" id="archive-control"></div>

        <section class="game" aria-labelledby="puzzle-title">
          <div class="game-header">
            <div>
              <p class="eyebrow" id="puzzle-date">Loading...</p>
              <h2 id="puzzle-title"></h2>
            </div>
          </div>

          <div class="panels" id="panels" aria-label="Storyboard clue panels"></div>

          <form class="guess-form" id="guess-form" novalidate>
            <label for="guess-input">Song title</label>
            <div class="guess-row">
              <input
                id="guess-input"
                name="guess"
                type="text"
                autocomplete="off"
                placeholder="Type your guess"
                required
              />
              <button type="submit">Guess</button>
            </div>
            <button class="artist-reveal-button" id="reveal-artist-button" type="button">
              Reveal Artist
            </button>
            <p class="attempts" id="attempts-count" aria-live="polite"></p>
          </form>

          <p class="artist-hint" id="artist-hint" aria-live="polite" hidden></p>
          <p class="validation-message" id="validation-message" role="status" aria-live="polite" hidden></p>
          <p class="message" id="message" aria-live="polite"></p>
          <ol class="guess-list" id="guess-list" aria-label="Previous guesses"></ol>
        </section>
      </div>
    </main>
  </body>
</html>
